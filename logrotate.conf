# EasyCICD 로그 로테이션 설정
# 설치 방법:
#   sudo ln -s /home/choho97/easycicd/logrotate.conf /etc/logrotate.d/easycicd
# 적용 확인:
#   sudo logrotate -d /etc/logrotate.d/easycicd
#
# 주의: tracing-appender는 파일을 agent.log.YYYY-MM-DD 형식으로 생성함.
#       (날짜가 접미사 → *.log 패턴이 아닌 agent.log.* 패턴으로 매칭해야 함)

# Agent 애플리케이션 로그 (e.g. agent.log.2026-02-27)
/home/choho97/easycicd/logs/agent/agent.log.* {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
}

# 감사(Audit) 로그 – 보안 이벤트, 더 오래 보관 (e.g. audit.log.2026-02-27)
/home/choho97/easycicd/logs/audit/audit.log.* {
    daily
    rotate 90
    compress
    delaycompress
    missingok
    notifempty
}

# Docker 이벤트 로그 (e.g. events.2026-02-27.log)
# docker-events-logger가 날짜별 파일에 직접 append하므로 copytruncate 사용
/home/choho97/easycicd/logs/docker-events/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
